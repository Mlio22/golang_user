basePath: /
definitions:
  models.User:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
    type: object
  router.ErrorResponseDTO:
    properties:
      error:
        type: string
    type: object
  router.MessageResponseDTO:
    properties:
      message:
        type: string
    type: object
  router.UserInputDTO:
    properties:
      email:
        maxLength: 255
        type: string
      first_name:
        maxLength: 100
        minLength: 1
        type: string
      last_name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - email
    - first_name
    - last_name
    type: object
  router.UserResponseDTO:
    properties:
      data:
        $ref: '#/definitions/models.User'
    type: object
  router.UsersResponseDTO:
    properties:
      data:
        items:
          $ref: '#/definitions/models.User'
        type: array
    type: object
info:
  contact:
    email: muhammatliopratama@gmail.com
    name: API Support
    url: mailto:muhammatliopratama@gmail.com
  description: This is a simple user management API built with Go and Gin framework.
    It allows you to create, read, update, and delete users in memory. The API also
    includes Swagger documentation for easy testing and integration.
  title: Golang User Management API
  version: "1.0"
paths:
  /api/users:
    get:
      description: Returns all users
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.UsersResponseDTO'
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a user. and increase id counter
      parameters:
      - description: User payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/router.UserInputDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/router.UserResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
      summary: Create user
      tags:
      - users
  /api/users/{id}:
    delete:
      description: Deletes one user from the in-memory list.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.MessageResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
      summary: Delete user
      tags:
      - users
    get:
      description: Returns one user by ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.UserResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
      summary: Get user
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates user by id.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: User payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/router.UserInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.UserResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/router.ErrorResponseDTO'
      summary: Update user
      tags:
      - users
schemes:
- http
swagger: "2.0"
